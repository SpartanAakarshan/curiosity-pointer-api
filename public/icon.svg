<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#12124a"/>
      <stop offset="100%" stop-color="#05050f"/>
    </radialGradient>
    <radialGradient id="cursorglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7777ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4444ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <linearGradient id="cursorgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#aaaaff"/>
      <stop offset="100%" stop-color="#5555ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="128" height="128" rx="22" fill="none" stroke="#7777ff" stroke-width="2" opacity="0.9"/>

  <!-- Glow halo behind cursor -->
  <circle cx="50" cy="60" r="38" fill="url(#cursorglow)" filter="url(#softblur)"/>

  <!-- Cursor arrow — bright gradient fill -->
  <path d="M34 26 L34 82 L50 66 L62 95 L73 90 L61 61 L82 61 Z"
        fill="url(#cursorgrad)" stroke="#0a0a30" stroke-width="2" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Cursor left-edge highlight -->
  <path d="M34 26 L34 82 L38 76 L38 36 Z" fill="#ccccff" opacity="0.35"/>

  <!-- Spark cluster — top right -->
  <circle cx="92" cy="36" r="5" fill="#ffffff" opacity="1" filter="url(#glow)"/>
  <circle cx="105" cy="50" r="3.5" fill="#aaaaff" opacity="0.95" filter="url(#glow)"/>
  <circle cx="100" cy="25" r="2.5" fill="#ffffff" opacity="0.85"/>
  <circle cx="112" cy="38" r="2" fill="#8888ff" opacity="0.8"/>
  <circle cx="86" cy="23" r="1.5" fill="#ccccff" opacity="0.7"/>

  <!-- Radiating spark lines -->
  <line x1="92" y1="24" x2="92" y2="16" stroke="#ffffff" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
  <line x1="104" y1="36" x2="111" y2="29" stroke="#aaaaff" stroke-width="2" opacity="0.85" stroke-linecap="round"/>
  <line x1="80" y1="33" x2="73" y2="26" stroke="#8888ff" stroke-width="1.5" opacity="0.75" stroke-linecap="round"/>
  <line x1="92" y1="48" x2="92" y2="56" stroke="#7777ff" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="103" y1="24" x2="109" y2="18" stroke="#ccccff" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
</svg>
